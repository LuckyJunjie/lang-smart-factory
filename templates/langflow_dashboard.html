<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangFlow 工作流监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; }
        
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 18px; color: #667eea; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
        
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.running { background: #d1ecf1; color: #0c5460; }
        .status.done { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        
        .step { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .step:last-child { border-bottom: none; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: #667eea; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; margin-right: 12px; }
        .step.active .step-num { background: #28a745; }
        .step.pending .step-num { background: #ccc; }
        
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .metric { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 8px; }
        .metric-value { font-size: 28px; font-weight: bold; color: #667eea; }
        .metric-label { font-size: 12px; color: #666; margin-top: 4px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; }
        
        .refresh-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 16px; }
        .refresh-btn:hover { background: #5a6fd6; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 LangFlow 工作流监控</h1>
            <p>实时监控智能软件开发流水线状态</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📊 系统概览</h2>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value" id="activeProjects">-</div>
                        <div class="metric-label">活跃项目</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="totalTasks">-</div>
                        <div class="metric-label">总任务数</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="passRate">-</div>
                        <div class="metric-label">通过率</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>🔄 工作流状态</h2>
                <div id="workflowStatus">
                    <p class="loading">加载中...</p>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 16px;">
            <h2>📋 工作流节点</h2>
            <div id="nodeProgress">
                <div class="step active">
                    <div class="step-num">1</div>
                    <div>需求分析 (DemandAnalyst)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">2</div>
                    <div>架构设计 (Architect)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">3</div>
                    <div>详细设计 (DetailDesigner)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">4</div>
                    <div>任务派发 (Dispatcher)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">5</div>
                    <div>代码实现 (Developer)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">6</div>
                    <div>测试验收 (Tester)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">7</div>
                    <div>游戏评估 (GamePlayEvaluator)</div>
                </div>
                <div class="step pending">
                    <div class="step-num">8</div>
                    <div>最终验收 (Acceptance)</div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 16px;">
            <h2>📜 执行历史</h2>
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>项目</th>
                        <th>步骤</th>
                        <th>状态</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody id="executionHistory">
                    <tr><td colspan="5" style="text-align:center;color:#999">暂无执行记录</td></tr>
                </tbody>
            </table>
        </div>
        
        <button class="refresh-btn" onclick="loadStatus()">🔄 刷新数据</button>
    </div>
    
    <script>
        async function loadStatus() {
            try {
                const resp = await fetch('/api/v1/workflow/status');
                const data = await resp.json();
                
                document.getElementById('activeProjects').textContent = data.active_projects || '-';
                document.getElementById('totalTasks').textContent = data.total_tasks || '-';
                document.getElementById('passRate').textContent = (data.pass_rate || 0) + '%';
                
                const status = data.current_step || 'unknown';
                document.getElementById('workflowStatus').innerHTML = `
                    <p>当前项目: <strong>${data.project_id || 'N/A'}</strong></p>
                    <p>当前步骤: <span class="status-badge status-running">${status}</span></p>
                    <p>活跃任务: ${data.active_tasks || 0}</p>
                `;
            } catch (e) {
                document.getElementById('workflowStatus').innerHTML = '<p class="status-badge status-error">加载失败</p>';
            }
        }
        
        // 初始加载
        loadStatus();
        
        // 每30秒自动刷新
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
