<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangFlow 完整监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; }
        .dashboard { display: grid; grid-template-columns: 250px 1fr 300px; min-height: 100vh; }
        .sidebar { background: #16213e; padding: 20px; overflow-y: auto; }
        .main { padding: 20px; overflow-y: auto; }
        .timeline { background: #16213e; padding: 20px; }
        
        .project-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .project-item:hover { background: #0f3460; }
        .project-item.active { background: #0f3460; border-left: 3px solid #667eea; }
        
        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
        h2 { font-size: 16px; color: #667eea; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        .metric-card { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .metric { text-align: center; }
        .metric-value { font-size: 36px; font-weight: bold; color: #667eea; }
        .metric-label { font-size: 12px; color: #aaa; margin-top: 4px; text-transform: uppercase; }
        
        .timeline-item { border-left: 2px solid #667eea; padding-left: 16px; margin-bottom: 20px; position: relative; }
        .timeline-item::before { content: ''; width: 12px; height: 12px; background: #667eea; border-radius: 50%; position: absolute; left: -7px; top: 0; }
        .timeline-item.success::before { background: #28a745; }
        .timeline-item.error::before { background: #dc3545; }
        .timeline-item.running::before { background: #17a2b8; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .step-name { font-weight: 600; margin-bottom: 4px; }
        .step-time { font-size: 12px; color: #888; }
        
        .detail-section { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a4a; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #888; }
        .detail-value { font-weight: 500; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.success { background: #28a745; }
        .status-dot.error { background: #dc3545; }
        .status-dot.running { background: #17a2b8; animation: pulse 1s infinite; }
        .status-dot.pending { background: #666; }
        
        .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h2>📁 项目列表</h2>
            <div id="projectList">
                <div class="project-item active">
                    <div style="font-weight:600">lang-smart-factory</div>
                    <div style="font-size:12px;color:#888;margin-top:4px">Phase 4-5 开发中</div>
                </div>
                <div class="project-item">
                    <div style="font-weight:600">stock-analyzer</div>
                    <div style="font-size:12px;color:#888;margin-top:4px">已完成</div>
                </div>
            </div>
        </div>
        
        <div class="main">
            <h1>🔄 LangFlow 实时监控</h1>
            
            <div class="metric-card">
                <div class="metrics-grid">
                    <div class="metric">
                        <div class="metric-value" id="mProjects">2</div>
                        <div class="metric-label">活跃项目</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="mTasks">48</div>
                        <div class="metric-label">总任务</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="mPassed">42</div>
                        <div class="metric-label">已通过</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="mRunning">3</div>
                        <div class="metric-label">进行中</div>
                    </div>
                </div>
            </div>
            
            <div class="detail-section">
                <h2>📊 执行详情</h2>
                <div class="detail-row">
                    <span class="detail-label">当前步骤</span>
                    <span class="detail-value"><span class="status-dot running"></span>CI/CD 构建</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">项目进度</span>
                    <span class="detail-value">75%</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">预计完成</span>
                    <span class="detail-value">约 2 小时</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">最后更新</span>
                    <span class="detail-value" id="lastUpdate">-</span>
                </div>
            </div>
            
            <button class="btn" onclick="refreshData()">🔄 刷新数据</button>
        </div>
        
        <div class="timeline">
            <h2>📜 最近活动</h2>
            <div id="recentActivity">
                <div class="timeline-item success">
                    <div class="step-name"><span class="status-dot success"></span>需求分析完成</div>
                    <div class="step-time">10:30:00</div>
                </div>
                <div class="timeline-item success">
                    <div class="step-name"><span class="status-dot success"></span>架构设计完成</div>
                    <div class="step-time">10:45:00</div>
                </div>
                <div class="timeline-item success">
                    <div class="step-name"><span class="status-dot success"></span>详细设计完成</div>
                    <div class="step-time">11:00:00</div>
                </div>
                <div class="timeline-item running">
                    <div class="step-name"><span class="status-dot running"></span>代码实现中</div>
                    <div class="step-time">11:15:00 - 进行中</div>
                </div>
                <div class="timeline-item pending">
                    <div class="step-name"><span class="status-dot pending"></span>测试验收</div>
                    <div class="step-time">待执行</div>
                </div>
                <div class="timeline-item pending">
                    <div class="step-name"><span class="status-dot pending"></span>人工审批</div>
                    <div class="step-time">待执行</div>
                </div>
                <div class="timeline-item pending">
                    <div class="step-name"><span class="status-dot pending"></span>发布</div>
                    <div class="step-time">待执行</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('zh-CN');
        }
        
        async function refreshData() {
            try {
                const resp = await fetch('/api/v1/dashboard/stats');
                const data = await resp.json();
                
                document.getElementById('mProjects').textContent = data.active_projects || 2;
                document.getElementById('mTasks').textContent = data.total_tasks || 48;
                document.getElementById('mPassed').textContent = data.passed || 42;
                document.getElementById('mRunning').textContent = data.running || 3;
            } catch (e) {
                console.log('Using default values');
            }
            updateTime();
        }
        
        updateTime();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
