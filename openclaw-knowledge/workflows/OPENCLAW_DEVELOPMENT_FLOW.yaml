# OpenClaw Development Flow — single canonical YAML (v3.1)
# Collaboration narrative: OPENCLAW_COMMUNICATION_SYSTEM.md
# Team standalone narrative: OPENCLAW_STANDALONE_WORKFLOW.md
# Organization: ORGANIZATION.md

version: "3.1"
updated: "2026-04-08"
source_doc: "OPENCLAW_COMMUNICATION_SYSTEM.md"
standalone_doc: "OPENCLAW_STANDALONE_WORKFLOW.md"
organization_doc: "ORGANIZATION.md"

# ---------------------------------------------------------------------------
# 0. ENTITY CODES (API-computed; docs/REQUIREMENTS.md §2.0)
# ---------------------------------------------------------------------------
entity_codes:
  spec: "../../docs/REQUIREMENTS.md"
  section: "§2.0"
  use_in:
    - "status-report tasks[]"
    - "stream:results payloads"
    - "report templates"
    - "work/ directory naming"

# ---------------------------------------------------------------------------
# 0.1 ROLE SKILL POLICY (mandatory)
# ---------------------------------------------------------------------------
role_skill_policy:
  vanguard001:
    role: "项目管理 + 技术主控"
    required_skills: ["assign_tasks_to_teams", "generate_daily_report", "meeting_participation"]
    optional_spawn_specialists: ["coding-assistant", "tech-researcher", "stock-analyzer"]
  hera:
    role: "项目管理经理"
    required_skills: ["handle_blockage", "hera_monitor", "meeting_participation"]
    optional_spawn_specialists: ["demand-analyst", "risk-manager", "reporter"]
  jarvis:
    role: "Mac 开发主管"
    required_skills: ["develop_requirement", "team_sync", "report_team_status", "report_machine_status", "meeting_participation"]
    godot_skills_policy:
      project_level: "godogen"
      task_level: "godot-task"
    optional_spawn_specialists: ["mac-developer", "bug-fixer", "render-engineer"]
    named_spawn_agents:
      - { id: "athena", type: "mac-developer", workspace: "organization/workspace/jarvis/athena/" }
      - { id: "cerberus", type: "bug-fixer", workspace: "organization/workspace/jarvis/cerberus/" }
      - { id: "apollo", type: "render-engineer", workspace: "organization/workspace/jarvis/apollo/" }
      - { id: "hermes", type: "devops-support", workspace: "organization/workspace/jarvis/hermes/" }
      - { id: "chiron", type: "scrum-coordinator", workspace: "organization/workspace/jarvis/chiron/" }
  codeforge:
    role: "Windows 开发主管"
    required_skills: ["develop_requirement", "team_sync", "report_team_status", "report_machine_status", "meeting_participation"]
    godot_skills_policy:
      project_level: "godogen"
      task_level: "godot-task"
    optional_spawn_specialists: ["win-developer", "bug-fixer", "render-engineer"]
    named_spawn_agents:
      - { id: "pangu", type: "win-developer", workspace: "organization/workspace/codeforge/pangu/" }
      - { id: "nuwa", type: "bug-fixer", workspace: "organization/workspace/codeforge/nuwa/" }
      - { id: "luban", type: "render-engineer", workspace: "organization/workspace/codeforge/luban/" }
      - { id: "yu", type: "devops-support", workspace: "organization/workspace/codeforge/yu/" }
      - { id: "shennong", type: "scrum-coordinator", workspace: "organization/workspace/codeforge/shennong/" }
  dinosaur:
    role: "未来 NAS 开发/渲染主管"
    required_skills: ["develop_requirement", "team_sync", "report_team_status", "report_machine_status", "meeting_participation"]
    godot_skills_policy:
      project_level: "godogen"
      task_level: "godot-task"
    optional_spawn_specialists: ["mac-developer", "bug-fixer", "render-engineer", "nas-manager"]
    named_spawn_agents:
      - { id: "trex", type: "mac-developer", workspace: "organization/workspace/dinosaur/trex/" }
      - { id: "raptor", type: "bug-fixer", workspace: "organization/workspace/dinosaur/raptor/" }
      - { id: "ptero", type: "render-engineer", workspace: "organization/workspace/dinosaur/ptero/" }
      - { id: "bronto", type: "nas-manager", workspace: "organization/workspace/dinosaur/bronto/" }
  tesla:
    role: "游戏测试与开发主管（测试主责）"
    required_skills:
      - "test_requirement"
      - "develop_requirement"
      - "team_sync"
      - "report_team_status"
      - "report_machine_status"
      - "meeting_participation"
    godot_skills_policy:
      project_level: "godogen"
      task_level: "godot-task"
    optional_spawn_specialists: ["game-tester", "ux-reviewer", "mac-developer", "bug-fixer"]
    named_spawn_agents:
      - { id: "model_s", type: "game-tester", workspace: "organization/workspace/tesla/model_s/" }
      - { id: "model_3", type: "ux-reviewer", workspace: "organization/workspace/tesla/model_3/" }
      - { id: "model_x", type: "bug-fixer", workspace: "organization/workspace/tesla/model_x/" }
      - { id: "model_y", type: "mac-developer", workspace: "organization/workspace/tesla/model_y/" }
      - { id: "cybertruck", type: "devops-support", workspace: "organization/workspace/tesla/cybertruck/" }
  newton:
    role: "游戏测试与开发主管（测试主责）"
    required_skills:
      - "test_requirement"
      - "develop_requirement"
      - "team_sync"
      - "report_team_status"
      - "report_machine_status"
      - "meeting_participation"
    godot_skills_policy:
      project_level: "godogen"
      task_level: "godot-task"
    optional_spawn_specialists: ["game-tester", "ux-reviewer", "mac-developer", "bug-fixer"]
    named_spawn_agents:
      - { id: "einstein", type: "mac-developer", workspace: "organization/workspace/newton/einstein/" }
      - { id: "curie", type: "game-tester", workspace: "organization/workspace/newton/curie/" }
      - { id: "galileo", type: "render-engineer", workspace: "organization/workspace/newton/galileo/" }
      - { id: "darwin", type: "ux-reviewer", workspace: "organization/workspace/newton/darwin/" }
      - { id: "hawking", type: "ui-designer", workspace: "organization/workspace/newton/hawking/" }

# ---------------------------------------------------------------------------
# 0.2 ENVIRONMENT BOOTSTRAP (self-install by agents)
# ---------------------------------------------------------------------------
environment_bootstrap:
  canonical_doc: "openclaw-knowledge/docs/TOOLCHAIN.md"
  common:
    required_commands:
      - "python3"
      - "git"
    python_packages:
      - "requests"
    python_packages_when_running_repo_tests:
      - "flask"
      - "pytest"
      - "pytest-cov"
      - "pyyaml"
    install_notes:
      - "Full install/verify matrix: see canonical_doc (openclaw-knowledge/docs/TOOLCHAIN.md)"
      - "If requests is missing: python3 -m pip install requests"
      - "For API/pytest at repo root: python3 -m pip install flask pytest pytest-cov requests pyyaml"
      - "Set SMART_FACTORY_API to the API base URL (e.g. http://192.168.3.75:5000/api)"
      - "For Feishu reporting, set FEISHU_WEBHOOK_URL where required"
      - "Optional MCP: pip install -r openclaw-knowledge/mcp/requirements.txt"
  godot_development:
    godot_baseline_version: "4.5.1-stable"
    required_for_roles: ["jarvis", "codeforge", "dinosaur", "tesla", "newton"]
    required_commands:
      - "godot"
      - "timeout"
    recommended_commands:
      - "xvfb-run"
      - "ffmpeg"
      - "gdlint"
    verify_commands:
      - "godot --version"
      - "timeout 30 godot --headless --quit 2>&1"
    install_examples:
      macos:
        - "Prefer official Godot 4.5.1-stable .dmg/.zip from GitHub releases; verify: godot --version"
        - "brew install --cask godot  # then confirm version is 4.5.1; else use official binary"
        - "brew install coreutils ffmpeg"
      ubuntu_debian:
        - "Install Godot 4.5.1 official Linux binary from GitHub releases; chmod +x and put on PATH (do not rely on apt godot3 for Godot 4.x)"
        - "sudo apt-get update && sudo apt-get install -y xvfb ffmpeg python3-pip"
      windows:
        - "Prefer official Godot 4.5.1 win64 from GitHub releases; verify: godot --version"
        - "winget install -e --id GodotEngine.GodotEngine  # verify version after install"
        - "winget install -e --id Gyan.FFmpeg"
    notes:
      - "Baseline version: 4.5.1-stable — see canonical_doc"
      - "Use headless mode for CI/agent automation: godot --headless"
      - "Before scene/script validation, run import step when assets changed: timeout 60 godot --headless --import"
      - "godot-task doc API bootstrap: bash openclaw-knowledge/skills/godot-task/tools/ensure_doc_api.sh"
  spawn_mode:
    policy: "named-workspace-spawn"
    note: "Named sub-agents have persistent workspace profiles, but they are not resident processes. Team Main must launch them via sessions_spawn before any executor assignment."

# ---------------------------------------------------------------------------
# 0.3 REDIS TOPOLOGY (prefix smartfactory; see REDIS_COLLABORATION.md)
# ---------------------------------------------------------------------------
redis:
  prefix: "smartfactory"
  channels:
    task_dispatch: "smartfactory:task:dispatch"
    task_blocker: "smartfactory:task:blocker"
    agent_heartbeat: "smartfactory:agent:heartbeat"
  streams:
    tasks: "smartfactory:stream:tasks"
    results: "smartfactory:stream:results"
    blockers: "smartfactory:stream:blockers"
  consumer_groups:
    dev_teams: "dev-teams"
    test_teams: "test-teams"
    hera: "hera-group"

# ---------------------------------------------------------------------------
# 1. OVERVIEW
# ---------------------------------------------------------------------------
overview:
  description: |
    OpenClaw supports two equivalent execution modes: (A) Vanguard-coordinated multi-device collaboration
    with Redis + API, and (B) team standalone closure where Master Jay / Winnie Chen brief Team Manager
    directly; one team spawns sub-agents and completes dev/test/review/push without inter-device Redis.
    See standalone_doc for (B); source_doc for (A). Requirements may use readable codes when DB is used.
  execution_layer: "Smart Factory CLI (python3 -m cli); mode (A): SMART_FACTORY_API + Redis smartfactory:* for inter-team dispatch; mode (B): same CLI/skills locally, Redis not mandatory for coordination"
  cli_readme: "openclaw-knowledge/cli/README.md"

# ---------------------------------------------------------------------------
# 1.1 EXECUTION MODES (collaboration vs standalone)
# ---------------------------------------------------------------------------
execution_modes:
  vanguard_coordinated:
    narrative_doc: "OPENCLAW_COMMUNICATION_SYSTEM.md"
    summary: "Multi-device; Vanguard/Hera; Redis Streams tasks/results + API DB"
    mandatory_for_inter_team_dispatch: ["REDIS_URI (smartfactory:*)", "SMART_FACTORY_API for assigned-requirements sync"]
    primary_workflows: ["vanguard_hourly", "dev_team_cycle", "tesla_cycle", "newton_cycle", "hera_cycle", "blockage_flow"]
  team_standalone:
    narrative_doc: "OPENCLAW_STANDALONE_WORKFLOW.md"
    summary: "Leadership brief → Team Manager → project docs gap analysis → spawn sub-agents → test/review → push → report Master Jay"
    inter_device_redis: "not required"
    smart_factory_api: "optional (e.g. ledger only); not required for sub-agent coordination"
    shared_with_collaboration:
      dod: "openclaw-knowledge/standards/DEFINITION_OF_DONE.md"
      report_templates: "openclaw-knowledge/standards/report/"
      role_skill_policy: "section 0.1 in this file (named_spawn_agents, godot_skills_policy)"
    artifact_paths:
      base: "<project_repo_root>/work/<agent>/"
      recommended_subdirs: ["input", "output"]
    primary_workflow: "team_standalone_cycle"

# ---------------------------------------------------------------------------
# 2. CONTACTS & REPORTING (from ORGANIZATION.md)
# ---------------------------------------------------------------------------
