# Prometheus Configuration
# Place this on the Raspberry Pi monitoring server (vanguard)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Vanguard (Raspberry Pi)
  - job_name: 'vanguard'
    static_configs:
      - targets: ['192.168.3.75:9100']
        labels:
          node: 'vanguard'
          role: 'monitoring'

  # Jarvis (Mac mini)
  - job_name: 'jarvis'
    static_configs:
      - targets: ['192.168.3.79:9100']
        labels:
          node: 'jarvis'
          role: 'development'

  # Windows (CodeForge)
  - job_name: 'windows'
    static_configs:
      - targets: ['192.168.3.4:9182']
        labels:
          node: 'windows'
          role: 'development'
